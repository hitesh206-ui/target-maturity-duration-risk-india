name: Update NAV and outputs

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHONPATH: .
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-nav-and-outputs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests matplotlib

      - name: Download AMFI NAV history
        run: |
          python scripts/download_nav_history_amfi.py

      - name: Download G-Sec yield history from Trading Economics
        continue-on-error: true
        run: |
          python scripts/download_gsec_yields_te.py

      - name: Import CCIL NSS curve wide CSV if present
        run: |
          python scripts/import_ccil_curve_wide.py

      - name: Import manually uploaded tenor-specific G-Sec yield CSVs if present
        run: |
          python scripts/import_manual_gsec_yields.py

      - name: Run duration analysis
        run: |
          python scripts/run_duration_analysis.py

      - name: Run NAV risk metrics
        run: |
          python scripts/run_nav_risk_metrics.py

      - name: Run empirical duration regression
        run: |
          python scripts/run_empirical_duration_regression.py

      - name: Generate charts
        run: |
          python scripts/generate_charts.py

      - name: Commit generated outputs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Update NAV history, G-Sec yields, regressions, risk metrics, and charts'
          file_pattern: 'data/processed/*.csv outputs/tables/*.csv outputs/charts/*.png'
